{% set name = "hyperspy-gui-ipywidgets" %}
{% set filename = "hyperspy_gui_ipywidgets" %}
{% set version = "2.1.1" %}
{% set sha256 = "0c92364cbc23a26f6ecc4f82ca98a5582c705f12bd3ce17fce4e0a23342bfc81" %}


package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  fn: {{ filename }}-{{ version }}.tar.gz
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ filename }}-{{ version }}.tar.gz
  sha256: {{ sha256 }}


build:
  number: 0
  noarch: python
  script: '{{ PYTHON }} -m pip install . --no-deps --ignore-installed --no-cache-dir -vvv '

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools >=64
    - setuptools-scm >=8

  run:
    - python >={{ python_min }}
    - link-traits
    - hyperspy-base >=2.3.0
    - ipywidgets >=8.0
    - ipympl

test:
  imports:
    - hyperspy_gui_ipywidgets

  commands:
    - export MPLBACKEND="agg"
    - pytest --pyargs hyperspy_gui_ipywidgets -k "not test_spikes_removal_tool"

  requires:
    - pytest
    - python {{ python_min }}

about:
  home: https://github.com/hyperspy/hyperspy_gui_ipywidgets
  license: GPL-3.0-or-later
  summary: ipywidgets GUI elements for HyperSpy.
  license_file: LICENSE

extra:
  recipe-maintainers:
    - to266
    - francisco-dlp
    - ericpre
